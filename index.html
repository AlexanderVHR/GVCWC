<script>

async function testApi() {

    const output = document.getElementById("matches");

    try {

        const response = await fetch(
            "https://worldcup26.ir/get/games"
        );

        output.innerHTML = `
            Status: ${response.status}<br>
            OK: ${response.ok}
        `;

    } catch (error) {

        output.innerHTML = `
            Error:<br>
            ${error.message}
        `;
    }
}

testApi();

</script>
