<script>

async function loadMatches() {

    const output = document.getElementById("matches");

    try {

        const response =
            await fetch("https://worldcup26.ir/get/games");

        const data =
            await response.json();

        output.innerHTML =
            "<pre>" +
            JSON.stringify(data, null, 2).substring(0, 3000) +
            "</pre>";

    } catch (err) {

        output.innerHTML =
            "Error: " + err.message;
    }
}

loadMatches();

</script>
