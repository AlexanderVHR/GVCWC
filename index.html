<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card {
    background:#1e1e1e;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🏆 Sweepstake Test</h1>

<div id="matches"></div>

<script>
console.log("SCRIPT STARTED");

document.getElementById("matches").innerHTML = "JS is running ✅";

const testData = [
    { home: "Australia", away: "Turkey", score: "2 - 0" },
    { home: "Qatar", away: "Switzerland", score: "1 - 1" }
];

const container = document.getElementById("matches");

container.innerHTML = "";

testData.forEach(m => {
    container.innerHTML += `
        <div class="card">
            <b>${m.home}</b> vs <b>${m.away}</b><br>
            ${m.score}
        </div>
    `;
});

</script>

</body>
</html>
