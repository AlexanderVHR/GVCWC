  "Czechia": "SJ",
  "Ecuador": "Corrinne",
  "Egypt": "Harry",
  "England": "Sam",
  "France": "Sharon",
  "Germany": "Amos",
  "Ghana": "Andrei",
  "Haiti": "Tanya",
  "Iran": "Jack",
  "Iraq": "Hamish",
  "Ivory Coast": "Michelle",
  "Japan": "Serena-Jo",
  "Jordan": "Serena-Jo",
  "Mexico": "SJ",

  "Uruguay": "Michelle",
  "Uzbekistan": "Judah"
};

function getOwner(teamName) {
  return countryOwners[teamName] || "Unassigned";
}

async function loadMatches() {

  const container = document.getElementById("matches");

  try {

    const res = await fetch("https://worldcup26.ir/get/games");
    const data = await res.json();

    const matches = data.games;

    container.innerHTML = matches.map(match => {

      const homeOwner = getOwner(match.home_team_name_en);
      const awayOwner = getOwner(match.away_team_name_en);

      return `
        <div class="card">

          <div style="display:flex; justify-content:space-between;">

            <div>
              <div><b>${match.home_team_name_en}</b></div>
              <div class="owner">${homeOwner}</div>
            </div>

            <div style="font-size:20px;">
              ${match.home_score} - ${match.away_score}
            </div>

            <div style="text-align:right;">
              <div><b>${match.away_team_name_en}</b></div>
              <div class="owner">${awayOwner}</div>
            </div>

          </div>

          <div style="margin-top:8px; font-size:12px; opacity:0.6;">
            ${match.finished === "TRUE" ? "FT" : "Upcoming"}
            • Group ${match.group}
            • ${match.local_date}
          </div>

        </div>
      `;

    }).join("");

  } catch (err) {
    container.innerHTML = "Error loading matches";
    console.error(err);
  }
}

loadMatches();

</script>
