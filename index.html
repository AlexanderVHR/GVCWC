<script>

const countryOwners = {
  "Australia": "Jack",
  "Qatar": "Ben",
  "Switzerland": "Mya",
  "Turkey": "Corrinne",
  "United States": "Caseu"
};

function getOwner(team) {
  return countryOwners[team] || "Unassigned";
}

async function loadMatches() {

  const container = document.getElementById("matches");

  container.innerHTML = "Loading API...";

  try {

    const res = await fetch("https://worldcup26.ir/get/games");

    container.innerHTML = "Parsing JSON...";

    const data = await res.json();

    // 🔴 DEBUG: show raw structure first
    console.log("FULL API RESPONSE:", data);

    const matches = data.games;

    if (!matches) {
      container.innerHTML =
        "❌ 'games' not found. API structure is different.<br><br>" +
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
      return;
    }

    container.innerHTML = "";

    matches.forEach(match => {

      const home = match.home_team_name_en;
      const away = match.away_team_name_en;

      container.innerHTML += `
        <div style="background:#1e1e1e; padding:12px; margin-bottom:10px; border-radius:10px;">

          <div style="display:flex; justify-content:space-between;">

            <div>
              <b>${home}</b>
              <div style="color:#00d26a; font-size:12px;">
                ${getOwner(home)}
              </div>
            </div>

            <div>
              ${match.home_score} - ${match.away_score}
            </div>

            <div style="text-align:right;">
              <b>${away}</b>
              <div style="color:#00d26a; font-size:12px;">
                ${getOwner(away)}
              </div>
            </div>

          </div>

        </div>
      `;

    });

  } catch (err) {

    console.error(err);

    container.innerHTML =
      "❌ JavaScript error:<br><br>" +
      err.message;

  }
}

loadMatches();

</script>
