<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.owner{
    color:#00d26a;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>🏆 World Cup Sweepstake</h1>

<div id="matches">
Loading...
</div>

<script>

const countryOwners = {
    "Brazil":"Josh",
    "France":"Sharon",
    "Germany":"Amos",
    "England":"Sam",
    "Argentina":"Richard"
};

async function loadMatches(){

    try{

        const response =
            await fetch("https://worldcup26.ir/get/games");

        const matches =
            await response.json();

        document.getElementById("matches").innerHTML =
            "API connected successfully.<br>" +
            "Matches found: " +
            matches.length;

    }
    catch(err){

        document.getElementById("matches").innerHTML =
            "API connection failed";

        console.error(err);
    }
}

loadMatches();

</script>

</body>
</html>
