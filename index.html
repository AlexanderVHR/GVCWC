<script>

const countryOwners = {
  "Australia": "Jack",
  "Qatar": "Ben",
  "Switzerland": "Mya",
  "Turkey": "Corrinne",
  "United States": "Caseu"
};

function getOwner(team) {
  return countryOwners[team] || "Unassigned";
}

async function loadMatches() {

  const container = document.getElementById("matches");

  container.innerHTML = "Loading API...";

  try {

    const res = await fetch("https://worldcup26.ir/get/games");

    const data = await res.json();

    console.log("API DATA:", data);

    // SAFE fallback: ensure array exists
    const matches = data.games || [];

    if (!Array.isArray(matches) || matches.length === 0) {
      container.innerHTML =
        "No matches found or API format changed.";
      return;
    }

    container.innerHTML = "";

    matches.forEach(match => {

      const home = match.home_team_name_en;
      const away = match.away_team_name_en;

      const homeScore = match.home_score ?? "-";
      const awayScore = match.away_score ?? "-";

      container.innerHTML += `
        <div class="card">

          <div style="display:flex; justify-content:space-between; align-items:center;">

            <div>
              <b>${home}</b>
              <div style="color:#00d26a; font-size:12px;">
                ${getOwner(home)}
              </div>
            </div>

            <div style="font-size:20px;">
              ${homeScore} - ${awayScore}
            </div>

            <div style="text-align:right;">
              <b>${away}</b>
              <div style="color:#00d26a; font-size:12px;">
                ${getOwner(away)}
              </div>
            </div>

          </div>

        </div>
      `;

    });

  } catch (err) {

    console.error(err);

    container.innerHTML =
      "API error: " + err.message;

  }
}

loadMatches();

</script>
