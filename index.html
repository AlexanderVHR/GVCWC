<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA Workplace Sweepstakes</title>

<style>
:root{
  --bg:#0b0f14;
  --card:#171d26;
  --card2:#212936;
  --border:#2e3748;
  --green:#00c853;
  --text:#fff;
  --muted:#9aa4b2;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

header{
  background:#111827;
  padding:20px;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid var(--border);
}

h1{
  font-size:22px;
}

.sub{
  color:var(--muted);
  margin-top:4px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
}

.card h2{
  padding:16px;
  background:var(--card2);
  border-bottom:1px solid var(--border);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.row:last-child{
  border-bottom:none;
}

.rank{
  width:30px;
  color:var(--green);
  font-weight:bold;
}

.owner{
  flex:1;
}

.points{
  font-weight:bold;
  color:var(--green);
}

.match{
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.match:last-child{
  border-bottom:none;
}

.match-header{
  color:var(--muted);
  font-size:12px;
  margin-bottom:6px;
}

.score{
  display:flex;
  justify-content:space-between;
  font-size:15px;
}

.country-list{
  max-height:700px;
  overflow:auto;
}

.country-row{
  display:flex;
  justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <h1>🏆 2026 FIFA Workplace Sweepstakes</h1>
  <div class="sub">Live scores powered by World Cup 2026 API</div>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <h2>🏆 Staff Leaderboard</h2>
      <div id="leaderboard"></div>
    </div>

    <div class="card">
      <h2>⚽ Recent Matches</h2>
      <div id="matches"></div>
    </div>

  </div>

  <br>

  <div class="card">
    <h2>🌍 Team Ownership</h2>
    <div class="country-list" id="teams"></div>
  </div>

</div>

<script>

const ownership = {
"Algeria":"Grace",
"Argentina":"Richard",
"Australia":"Jack",
"Austria":"Andrei",
"Belgium":"Alex R",
"Bosnia and Herzegovina":"Sharon",
"Brazil":"Josh",
"Canada":"Tanya",
"Cape Verde":"Richard",
"Colombia":"Corey",
"Congo DR":"Bazi",
"Croatia":"Alex B",
"Curaçao":"Amos",
"Czechia":"SJ",
"Ecuador":"Corrinne",
"Egypt":"Harry",
"England":"Sam",
"France":"Sharon",
"Germany":"Amos",
"Ghana":"Andrei",
"Haiti":"Tanya",
"Iran":"Jack",
"Iraq":"Hamish",
"Ivory Coast":"Michelle",
"Japan":"Serena-Jo",
"Jordan":"Serena-Jo",
"Mexico":"SJ",
"Morocco":"Casey",
"Netherlands":"Josh",
"New Zealand":"Hope",
"Norway":"Hamish",
"Panama":"Grace",
"Paraguay":"Selena",
"Portugal":"Judah",
"Qatar":"Ben",
"Saudi Arabia":"Hope",
"Scotland":"Ben",
"Senegal":"Tony",
"South Africa":"Sam",
"South Korea":"Harry",
"Spain":"Bazi",
"Sweden":"Alex B",
"Switzerland":"Mya",
"Tunisia":"Mya",
"Turkey":"Corrinne",
"Türkiye":"Corrinne",
"United States":"Casey",
"Uruguay":"Michelle",
"Uzbekistan":"Judah"
};

function renderTeams(){
  const teamsDiv = document.getElementById("teams");

  Object.entries(ownership)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .forEach(([country,owner])=>{
      teamsDiv.innerHTML += `
        <div class="country-row">
          <span>${country}</span>
          <strong>${owner}</strong>
        </div>
      `;
    });
}

async function loadData(){

  try{

    const res = await fetch("https://worldcup26.ir/get/games");
    const games = await res.json();

    const playerScores = {};
    Object.values(ownership).forEach(name=>{
      playerScores[name]=0;
    });

    const matchesDiv = document.getElementById("matches");
    matchesDiv.innerHTML="";

    games.slice(0,20).forEach(match=>{

      const home =
        match.home_team ||
        match.homeTeam ||
        match.team1 ||
        match.team_a ||
        "";

      const away =
        match.away_team ||
        match.awayTeam ||
        match.team2 ||
        match.team_b ||
        "";

      const homeScore =
        Number(match.home_score ??
        match.homeScore ??
        match.score1 ?? 0);

      const awayScore =
        Number(match.away_score ??
        match.awayScore ??
        match.score2 ?? 0);

      const finished =
        match.finished ??
        match.isFinished ??
        true;

      if(finished){

        if(homeScore > awayScore){
          const owner = ownership[home];
          if(owner) playerScores[owner]+=3;
        }
        else if(awayScore > homeScore){
          const owner = ownership[away];
          if(owner) playerScores[owner]+=3;
        }
        else{
          const hOwner = ownership[home];
          const aOwner = ownership[away];
          if(hOwner) playerScores[hOwner]+=1;
          if(aOwner) playerScores[aOwner]+=1;
        }
      }

      matchesDiv.innerHTML += `
        <div class="match">
          <div class="match-header">
            ${match.group || match.stage || ""}
          </div>
          <div class="score">
            <span>${home}</span>
            <strong>${homeScore} - ${awayScore}</strong>
            <span>${away}</span>
          </div>
        </div>
      `;
    });

    const leaderboard = Object.entries(playerScores)
      .sort((a,b)=>b[1]-a[1]);

    const leaderboardDiv =
      document.getElementById("leaderboard");

    leaderboardDiv.innerHTML="";

    leaderboard.forEach(([name,pts],index)=>{
      leaderboardDiv.innerHTML += `
        <div class="row">
          <div class="rank">${index+1}</div>
          <div class="owner">${name}</div>
          <div class="points">${pts}</div>
        </div>
      `;
    });

  }
  catch(err){
    console.error(err);
  }
}

renderTeams();
loadData();

setInterval(loadData,60000);

</script>

</body>
</html>
